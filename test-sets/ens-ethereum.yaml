deployment:
  id: "0xce57e4bc7b885a6255edd3e9d1617bb8819559f3903b84c18bb5db31afe17d06"
  ipfs_hash: "QmcE8RpWtsiN5hkJKdfCXGfTDoTgPEjMbQwnjLPfThT7kZ"
  network: "mainnet"
  description: "ENS (Ethereum Mainnet)"
  gateway_subgraph_id: "5XqPmWe6gjyrJtFn9cLy237i4cWw2j9HcUJEXsP5qGtH"

queries:
  # ── Aggregate: recent domains ─────────────────────────────────────────────────
  - category: Q_agg
    template: |
      {
        domains(
          first: 20
          orderBy: createdAt
          orderDirection: desc
          where: { name_not: null }
          block: { hash: "$block_hash" }
        ) {
          id
          name
          subdomainCount
          isMigrated
          createdAt
          owner { id }
        }
        _meta {
          block { number }
        }
      }

  # ── By-ID: well-known protocol-owned ENS names ───────────────────────────────
  - category: Q_byid
    template: |
      {
        domain(id: "$id", block: { hash: "$block_hash" }) {
          id
          name
          owner { id }
          registrant { id }
          expiryDate
          subdomainCount
          isMigrated
          createdAt
        }
        _meta {
          block { number }
        }
      }
