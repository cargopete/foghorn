services:
  probe:
    build:
      context: .
      dockerfile: Dockerfile
      target: probe
    restart: unless-stopped
    environment:
      FOGHORN__DATABASE_URL: "postgres://dispatch:dispatch@drpc-postgres-1:5432/foghorn"
      RUST_LOG: "foghorn_probe=info,reqwest=warn"
    volumes:
      - ./config.toml:/app/config.toml:ro
      - ./test-sets:/app/test-sets:ro
    working_dir: /app
    networks:
      - foghorn_net
      - drpc_default

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      FOGHORN__DATABASE_URL: "postgres://dispatch:dispatch@drpc-postgres-1:5432/foghorn"
      FOGHORN__API_PORT: "8080"
      FOGHORN__API_HOST: "0.0.0.0"
      RUST_LOG: "foghorn_api=info,tower_http=info"
    networks:
      - foghorn_net
      - drpc_default

networks:
  foghorn_net:
    driver: bridge
  drpc_default:
    external: true
